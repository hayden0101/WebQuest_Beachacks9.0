<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Speech Test (Web Speech API)</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; }
      #transcript { white-space: pre-wrap; border:1px solid #ccc; padding:8px; width:720px; height:140px; overflow:auto }
      #counts { background:#f7f7f7; padding:8px; width:720px; height:120px; overflow:auto }
      button { margin-right:8px; }
    </style>
  </head>
  <body>
    <h3>Speech Test (Web Speech API)</h3>
    <p>Open this page in Chrome or Edge, allow microphone, then click <strong>Start</strong>.</p>
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
    <div>
      <strong>Transcript:</strong>
      <div id="transcript"></div>
    </div>
    <div style="margin-top:12px;">
      <strong>Word counts:</strong>
      <pre id="counts"></pre>
    </div>

    <script>
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const transcriptEl = document.getElementById('transcript');
      const countsEl = document.getElementById('counts');

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        transcriptEl.textContent = 'Web Speech API not supported in this browser. Use Chrome or Edge.';
        startBtn.disabled = true;
      } else {
        const recog = new SpeechRecognition();
        recog.lang = 'en-US';
        recog.interimResults = true;
        recog.continuous = true;

        let fullText = '';

        recog.onresult = (ev) => {
          let interim = '';
          for (let i = ev.resultIndex; i < ev.results.length; ++i) {
            const r = ev.results[i];
            if (r.isFinal) fullText += r[0].transcript + ' ';
            else interim += r[0].transcript;
          }
          transcriptEl.textContent = fullText + interim;
          updateCounts(transcriptEl.textContent);
        };

        recog.onerror = (e) => {
          transcriptEl.textContent += `\n[error] ${e.error}`;
        };

        startBtn.addEventListener('click', () => {
          try {
            recog.start();
            startBtn.disabled = true;
            stopBtn.disabled = false;
          } catch (e) { /* ignore already started */ }
        });

        stopBtn.addEventListener('click', () => {
          recog.stop();
          startBtn.disabled = false;
          stopBtn.disabled = true;
        });
      }

      function updateCounts(text) {
        const words = text.trim().toLowerCase().match(/\b\w+\b/g) || [];
        const counts = {};
        for (const w of words) counts[w] = (counts[w] || 0) + 1;
        countsEl.textContent = JSON.stringify(counts, null, 2);
      }
    </script>
  </body>
</html>
