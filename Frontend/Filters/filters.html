<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Filters</title>
  </head>
  <body>
    <h1>Game Filters</h1>
    <p>Choose between the different game options</p>

    <label for="region">Choose a region:</label>

    <select id="region">
      <option value="">--Select--</option>
      <option value="local">Local</option>
      <option value="global">Global</option>
    </select>

    <div>
      <label for="players">Choose number of players:</label>
      <select id="players">
        <option value="">--Select--</option>
        <option value="local">Duos</option>
        <option value="global">Trios</option>
        <option value="global">Quads</option>
      </select>
    </div>

    <p>
      Add an image for emoji:
      <input type="file" id="fileinput" accept="image/*" />
    </p>
    <img id="preview" width="200" />

    <div>
      <a href="../GameUI/Gamecontainer/gamecontainer.html"
        ><button>Continue</button></a
      >
      <a href="../index.html"><button>Go back</button></a>
    </div>
  </body>
</html>
